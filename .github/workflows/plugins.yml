name: Plugin checks

on:
  push:
  pull_request:
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - name: Install Neovim
        run: |
          curl --fail --location --silent --show-error \
            --output /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/v0.12.2/nvim-linux-x86_64.tar.gz
          tar --extract --gzip --file /tmp/nvim.tar.gz --directory /tmp
          echo /tmp/nvim-linux-x86_64/bin >> "$GITHUB_PATH"
      - name: Install and load optional packages
        run: |
          XDG_DATA_HOME="$RUNNER_TEMP/sisuvim-data" \
          XDG_STATE_HOME="$RUNNER_TEMP/sisuvim-state" \
          XDG_CACHE_HOME="$RUNNER_TEMP/sisuvim-cache" \
          nvim --headless --cmd "set rtp^=$PWD" -u init.lua \
            '+lua require("lazy").sync({ wait = true })' \
            '+lua assert(vim.fn.exists(":Git") == 2)' \
            '+lua assert(require("snacks"))' \
            '+qa'
      - name: Ensure the lockfile is current
        run: git diff --exit-code -- lazy-lock.json
