name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - name: Validate version tag
        run: |
          test "${GITHUB_REF_NAME#v}" != "$GITHUB_REF_NAME"
          echo "$GITHUB_REF_NAME" | grep --extended-regexp '^v[0-9]+\.[0-9]+\.[0-9]+$'
      - name: Install Vim and Neovim
        run: |
          sudo apt-get update
          sudo apt-get install --yes vim curl
          curl --fail --location --silent --show-error \
            --output /tmp/nvim.tar.gz \
            https://github.com/neovim/neovim/releases/download/v0.12.2/nvim-linux-x86_64.tar.gz
          tar --extract --gzip --file /tmp/nvim.tar.gz --directory /tmp
          echo /tmp/nvim-linux-x86_64/bin >> "$GITHUB_PATH"
      - name: Run release checks
        run: ./tests/smoke.sh
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag
